services:
  # ─── MongoDB ───────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aleem_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: aleemehr2024
      MONGO_INITDB_DATABASE: aleem_ehr
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - aleem_network

  # ─── LiveKit Server ────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: aleem_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_KEYS=your-livekit-api-key: your-livekit-api-secret
    command: --dev --bind 0.0.0.0
    networks:
      - aleem_network

  # ─── FastAPI Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aleem_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_started
      livekit:
        condition: service_started
    networks:
      - aleem_network

  # ─── Next.js Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleem_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    networks:
      - aleem_network

volumes:
  mongo_data:

networks:
  aleem_network:
    driver: bridge
