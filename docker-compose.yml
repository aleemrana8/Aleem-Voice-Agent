services:
  # ─── MongoDB ───────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aleem_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: aleemehr2024
      MONGO_INITDB_DATABASE: aleem_ehr
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - aleem_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aleem_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://admin:aleemehr2024@mongodb:27017/aleem_ehr?authSource=admin
      - MONGO_DB_NAME=aleem_ehr
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aleem_network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── LiveKit Voice Agent Worker ────────────────────
  voice-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aleem_voice_agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://admin:aleemehr2024@mongodb:27017/aleem_ehr?authSource=admin
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    command: ["python", "-m", "app.livekit_agent", "start"]
    depends_on:
      mongodb:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - aleem_network

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aleem_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aleem_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Celery Worker ────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aleem_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://admin:aleemehr2024@mongodb:27017/aleem_ehr?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "-Q", "ehr_sync,notifications,analytics"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aleem_network

  # ─── Next.js Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleem_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aleem_network

  # ─── Nginx Reverse Proxy ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aleem_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - aleem_network

volumes:
  mongo_data:
  redis_data:

networks:
  aleem_network:
    driver: bridge
